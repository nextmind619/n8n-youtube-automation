<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="2560" height="1440" fill="url(#bannerBg)"/>
  <!-- decorative workflow lines -->
  <g opacity="0.35" stroke="url(#lineGrad)" stroke-width="3" fill="none">
    <path d="M0 720 Q640 500 1280 720 T2560 720"/>
    <path d="M0 900 Q800 1100 1600 900 T2560 900"/>
    <circle cx="400" cy="720" r="20" fill="#3B82F6"/>
    <circle cx="900" cy="650" r="16" fill="#8B5CF6"/>
    <circle cx="1280" cy="720" r="24" fill="#3B82F6"/>
    <circle cx="1660" cy="790" r="16" fill="#8B5CF6"/>
    <circle cx="2160" cy="720" r="20" fill="#3B82F6"/>
  </g>
  <!-- grid dots -->
  <g fill="#3B82F6" opacity="0.15">
    <circle cx="200" cy="200" r="4"/><circle cx="400" cy="300" r="4"/><circle cx="2360" cy="200" r="4"/>
    <circle cx="2200" cy="1200" r="4"/><circle cx="360" cy="1100" r="4"/>
  </g>
  <!-- SAFE ZONE: center 1546 x 423 recommended - we use center block -->
  <text x="1280" y="620" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" fill="#FFFFFF">AUTOPILOT AI LAB</text>
  <text x="1280" y="720" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" fill="#94A3B8">Automate Your Business with AI</text>
  <text x="1280" y="800" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#3B82F6">Make.com  "  n8n  "  Zapier  "  No-Code</text>
  <text x="1280" y="870" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#8B5CF6">New automation tutorials every week</text>
  <!-- accent bar -->
  <rect x="980" y="910" width="600" height="6" rx="3" fill="url(#lineGrad)"/>
