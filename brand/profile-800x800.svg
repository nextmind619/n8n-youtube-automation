<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- workflow nodes -->
  <circle cx="200" cy="400" r="48" fill="none" stroke="url(#accent)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="400" cy="400" r="56" fill="url(#accent)" opacity="0.25"/>
  <circle cx="400" cy="400" r="56" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <circle cx="600" cy="400" r="48" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <line x1="248" y1="400" x2="344" y2="400" stroke="#3B82F6" stroke-width="5"/>
  <line x1="456" y1="400" x2="552" y2="400" stroke="#8B5CF6" stroke-width="5"/>
  <!-- robot / autopilot icon center -->
  <rect x="340" y="280" width="120" height="90" rx="18" fill="#1E293B" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="370" cy="320" r="10" fill="#3B82F6"/>
  <circle cx="430" cy="320" r="10" fill="#3B82F6"/>
  <path d="M365 350 Q400 370 435 350" fill="none" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <rect x="385" y="250" width="30" height="24" rx="6" fill="#3B82F6"/>
  <path d="M400 250 L400 230 M385 230 L415 230" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <!-- small AI spark -->
  <path d="M520 260 L530 290 L560 300 L530 310 L520 340 L510 310 L480 300 L510 290 Z" fill="#FBBF24" opacity="0.9"/>
</svg>
